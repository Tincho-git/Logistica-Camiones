# === CONFIGURACIÓN DEL SERVICIO LOGISTICA ===

spring.datasource.url=jdbc:postgresql://db_logistica:5432/db_logistica
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=user
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.application.name=ms-logistica
server.port=8080

# =========== LOGGING CONFIG ===========
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.ar.edu.utn.frc.back3k7=DEBUG

# Logs de SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Archivo de logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n
